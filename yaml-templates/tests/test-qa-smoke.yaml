name: our-pot-app-qa
repo: https://github.com/kimwwk/our-pot-qa.git
toolchain: node

agent: qa
model: sonnet
timeout: 300

setup_command: npm install && npx playwright install --with-deps chromium

task: |
  Run the smoke tests in this repository against the deployed application.
  Run: `npm run test:smoke`
  Report the results — which tests passed, which failed, and any errors.

project_env:
  BASE_URL: https://our-pot-app-git-develop-kimwongwwk-gmailcoms-projects.vercel.app
